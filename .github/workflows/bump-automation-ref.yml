name: Bump automation workflow refs

on:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflow-config.yml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bump-automation-ref
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      # GITHUB_TOKEN 은 GitHub 정책상 .github/workflows/* 수정 push 가 거부되므로
      # ("refusing to allow a GitHub App to create or update workflow ... without
      # workflows permission") workflows:write 권한을 가진 GitHub App 토큰으로
      # checkout/push 한다. App 미설정 시 GITHUB_TOKEN 으로 폴백(이 경우 push 실패).
      - name: Mint GitHub App token
        id: app-token
        if: ${{ vars.APP_ID != '' }}
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # ratchet:actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Resolve token
        id: tok
        env:
          MINTED: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          if [ -n "${MINTED:-}" ]; then
            printf 'token=%s\n' "$MINTED" >> "$GITHUB_OUTPUT"
            echo "::notice::Using GitHub App token for workflow push"
          else
            printf 'token=%s\n' "${{ github.token }}" >> "$GITHUB_OUTPUT"
            echo "::warning::APP_ID 미설정 — GITHUB_TOKEN 으로는 .github/workflows push 가 거부됨 (App 에 workflows:write 권한 필요)"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.tok.outputs.token }}
          persist-credentials: true

      - name: Determine automation_ref change
        id: ref
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail

          new_ref="$(grep -E '^automation_ref:' .github/workflow-config.yml | awk '{print $2}')"
          if [ -z "${new_ref}" ]; then
            echo "automation_ref missing in .github/workflow-config.yml" >&2
            exit 1
          fi

          old_ref=""
          if git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            old_ref="$(git show "${BEFORE}:.github/workflow-config.yml" 2>/dev/null | grep -E '^automation_ref:' | awk '{print $2}' || true)"
          fi

          echo "old_ref=${old_ref}" >> "$GITHUB_OUTPUT"
          echo "new_ref=${new_ref}" >> "$GITHUB_OUTPUT"

          if [ "${old_ref}" = "${new_ref}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if automation_ref unchanged
        if: steps.ref.outputs.changed != 'true'
        run: |
          echo "automation_ref unchanged; nothing to bump."

      - name: Rewrite workflow refs
        if: steps.ref.outputs.changed == 'true'
        env:
          NEW_REF: ${{ steps.ref.outputs.new_ref }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          new_ref = os.environ["NEW_REF"].strip()
          if not re.fullmatch(r"v\d+(?:\.\d+)?", new_ref):
            raise SystemExit(f"NEW_REF must look like v1.9 (got {new_ref!r})")

          root = Path(".github/workflows")
          pattern = re.compile(
            r"(jhw7500/automation/\.github/(?:workflows|actions)/[^@\s'\"]+@)v\d+(?:\.\d+)?"
          )

          changed_files = 0
          for path in sorted(root.rglob("*.yml")):
            text = path.read_text(encoding="utf-8")
            new_text, n = pattern.subn(r"\1" + new_ref, text)
            if n:
              path.write_text(new_text, encoding="utf-8")
              changed_files += 1

          print(f"rewrote {changed_files} file(s)")
          PY

          git status --porcelain

      - name: Create PR
        if: steps.ref.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.tok.outputs.token }}
          NEW_REF: ${{ steps.ref.outputs.new_ref }}
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No changes after rewrite; skipping PR."
            exit 0
          fi

          branch="chore/bump-automation-${NEW_REF}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add .github/workflows
          git commit -m "chore: bump automation refs to ${NEW_REF}"
          git push -u origin "$branch"

          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$branch" \
            --title "chore: bump automation refs to ${NEW_REF}" \
            --body "automation_ref updated in .github/workflow-config.yml; this PR rewrites all jhw7500/automation workflow/action refs to ${NEW_REF}."
